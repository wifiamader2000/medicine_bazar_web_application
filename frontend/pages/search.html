<!DOCTYPE html><html lang="bn"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Search - Medicine Bazar</title><link rel="icon" href="/assets/images/medicine-placeholder.svg"><link rel="stylesheet" href="/css/style.css"></head><body>
<div data-mb-header></div>
<main class="section"><div class="container">
  <div class="section-header"><div><h1 class="section-title" id="search-title">Search Medicines</h1><p class="section-subtitle">Search by name, Bangla name, generic, company, category, strength, SKU, barcode, aliases and symptoms.</p></div></div>
  <div class="card" style="margin-bottom:20px;"><div style="display:flex;gap:12px;flex-wrap:wrap;"><select id="filter-sort" class="form-control" style="max-width:220px;"><option value="">Relevant</option><option value="sellingPrice:asc">Price Low-High</option><option value="sellingPrice:desc">Price High-Low</option><option value="name:asc">Name A-Z</option></select><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="filter-stock"> In Stock</label><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="filter-rx"> Rx Required</label></div></div>
  <div id="search-results" class="products-grid"><div class="empty-state"><h3>Type a medicine name to search</h3></div></div><div id="no-result-help" style="margin-top:20px;"></div><div id="pagination" class="pagination"></div>
</div></main>
<div data-mb-footer></div>
<script src="/js/components.js"></script><script>MB_COMPONENTS.mount('shop');</script><script src="/js/app.js"></script>
<script>
const params=new URLSearchParams(location.search);const q=params.get('q')||'';async function runSearch(page=1){if(!q)return;document.getElementById('search-input').value=q;document.getElementById('search-title').textContent=`Search: "${q}"`;const sort=document.getElementById('filter-sort').value,inStock=document.getElementById('filter-stock').checked,rx=document.getElementById('filter-rx').checked;let url=`/search/products?q=${encodeURIComponent(q)}&page=${page}&limit=20`;if(sort)url+=`&sort=${encodeURIComponent(sort)}`;if(inStock)url+='&inStock=true';if(rx)url+='&prescriptionRequired=true';const res=await MB.get(url);document.getElementById('search-results').innerHTML=res.success&&res.data.length?res.data.map(p=>MB.productCardHTML(p)).join(''):`<div class="empty-state"><h3>No results for "${q}"</h3><p>Try Napa, Paracetamol, fever, diabetes, cough or browse categories.</p></div>`;document.getElementById('no-result-help').innerHTML=!res.data?.length?'<div class="alert alert-info">No-result searches are logged for admin review so inventory gaps can be improved.</div>':'';const pages=res.pagination?.totalPages||0;document.getElementById('pagination').innerHTML=Array.from({length:pages},(_,i)=>`<button class="${i+1===page?'active':''}" onclick="runSearch(${i+1})">${i+1}</button>`).join('');}
document.addEventListener('DOMContentLoaded',()=>{['filter-sort','filter-stock','filter-rx'].forEach(id=>document.getElementById(id).addEventListener('change',()=>runSearch(1)));runSearch();});
</script></body></html>
