<!DOCTYPE html><html lang="bn"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shop - Medicine Bazar</title><link rel="icon" href="/assets/images/medicine-placeholder.svg"><link rel="stylesheet" href="/css/style.css"></head><body>
<div data-mb-header></div>
<main class="section"><div class="container">
  <div class="section-header"><div><h1 class="section-title">All Medicines</h1><p class="section-subtitle">Filter, sort, and search real products from the API inventory.</p></div></div>
  <div class="card" style="margin-bottom:20px;"><div style="display:flex;gap:12px;flex-wrap:wrap;">
    <select id="filter-category" class="form-control" style="max-width:220px;"><option value="">All Categories</option></select>
    <select id="filter-sort" class="form-control" style="max-width:220px;"><option value="">Newest</option><option value="name:asc">Name A-Z</option><option value="sellingPrice:asc">Price Low-High</option><option value="sellingPrice:desc">Price High-Low</option></select>
    <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="filter-stock"> In Stock Only</label>
    <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="filter-rx"> Prescription Required</label>
  </div></div>
  <div id="products-grid" class="products-grid"><div class="loading"><div class="spinner"></div></div></div><div id="pagination" class="pagination"></div>
</div></main>
<div data-mb-footer></div>
<script src="/js/components.js"></script><script>MB_COMPONENTS.mount('shop');</script><script src="/js/app.js"></script>
<script>
let currentPage=1;async function loadProducts(page=1){currentPage=page;const cat=document.getElementById('filter-category').value,sort=document.getElementById('filter-sort').value,inStock=document.getElementById('filter-stock').checked,rx=document.getElementById('filter-rx').checked;let url=`/products?page=${page}&limit=20`;if(cat)url+=`&category=${encodeURIComponent(cat)}`;if(sort)url+=`&sort=${encodeURIComponent(sort)}`;if(inStock)url+='&inStock=true';if(rx)url+='&prescriptionRequired=true';const res=await MB.get(url);document.getElementById('products-grid').innerHTML=res.success&&res.data.length?res.data.map(p=>MB.productCardHTML(p)).join(''):'<div class="empty-state"><h3>No products found</h3></div>';const pages=res.pagination?.totalPages||0;document.getElementById('pagination').innerHTML=Array.from({length:pages},(_,i)=>`<button class="${i+1===page?'active':''}" onclick="loadProducts(${i+1})">${i+1}</button>`).join('');}
document.addEventListener('DOMContentLoaded',async()=>{const cats=await MB.get('/categories');const select=document.getElementById('filter-category');if(cats.success)cats.data.forEach(c=>select.insertAdjacentHTML('beforeend',`<option value="${c.name}">${c.name}</option>`));['filter-category','filter-sort','filter-stock','filter-rx'].forEach(id=>document.getElementById(id).addEventListener('change',()=>loadProducts(1)));loadProducts();});
</script></body></html>
