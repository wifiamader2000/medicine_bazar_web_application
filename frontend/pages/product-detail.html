<!DOCTYPE html><html lang="bn"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Product Detail - Medicine Bazar</title><link rel="icon" href="/assets/images/medicine-placeholder.svg"><link rel="stylesheet" href="/css/style.css"></head><body>
<div data-mb-header></div><main class="section"><div class="container"><div id="product-detail"><div class="loading"><div class="spinner"></div></div></div><div id="related" style="margin-top:32px;"></div></div></main><div data-mb-footer></div>
<script src="/js/components.js"></script><script>MB_COMPONENTS.mount('shop');</script><script src="/js/app.js"></script>
<script>
const tabNames=[['overview','Overview'],['uses','Uses / কোন রোগে ব্যবহৃত'],['dosage','Dosage'],['sideEffects','Side Effects'],['warning','Warnings'],['storage','Storage'],['alternatives','Alternatives'],['reviews','Reviews']];
function switchTab(id){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));document.querySelectorAll('.tab-content').forEach(t=>t.classList.toggle('active',t.id===`tab-${id}`));}
document.addEventListener('DOMContentLoaded',async()=>{const id=location.pathname.split('/').pop();const res=await MB.get('/products/'+id);if(!res.success){document.getElementById('product-detail').innerHTML='<div class="empty-state"><h3>Product not found</h3><a href="/shop" class="btn btn-primary">Back to Shop</a></div>';return;}const p=res.data;document.title=`${p.name} - Medicine Bazar`;const images=[p.imageUrl,...(p.images||[])].filter(Boolean);const discount=p.mrp&&p.sellingPrice&&p.sellingPrice<p.mrp?Math.round((1-p.sellingPrice/p.mrp)*100):0;const tabs=tabNames.map(([id,label],i)=>`<button class="tab ${i===0?'active':''}" data-tab="${id}" onclick="switchTab('${id}')">${label}</button>`).join('');const content={overview:`${p.genericName||''}${p.dosageForm?'<br>Form: '+p.dosageForm:''}${p.packSize?'<br>Pack: '+p.packSize:''}`,uses:p.uses||'Information will be updated by pharmacist.',dosage:p.dosage||'Use only as directed by a registered physician.',sideEffects:p.sideEffects||'Consult your doctor or pharmacist for side effects.',warning:p.warning||(p.prescriptionRequired?'Prescription is required before dispensing.':'Follow label instructions.'),storage:p.storage||'Store below 30°C, away from direct sunlight and children.',alternatives:(p.alternatives||[]).map(a=>`<a href="/product/${a.id}">${a.name} ${a.strength||''}</a>`).join('<br>')||'No alternatives found.',reviews:(p.reviews||[]).length?p.reviews.map(r=>`<p><b>${r.customerName||'Customer'}</b>: ${r.comment||''}</p>`).join(''):'No reviews yet.'};
document.getElementById('product-detail').innerHTML=`<section class="product-detail-grid"><div class="product-gallery card"><img id="main-img" src="${images[0]||'/assets/images/medicine-placeholder.svg'}" alt="${p.name}" onerror="this.src='/assets/images/medicine-placeholder.svg'"><div class="thumbs">${images.map(img=>`<button onclick="document.getElementById('main-img').src='${img}'"><img src="${img}" alt="${p.name} thumbnail"></button>`).join('')}</div></div><div class="product-buybox"><div class="badges inline-badges">${discount?`<span class="badge badge-discount">${discount}% OFF</span>`:''}${p.prescriptionRequired?'<span class="badge badge-rx">Prescription Required</span>':''}<span class="badge badge-stock">${(p.stockQuantity||0)>0?'In Stock':'Out of Stock'}</span></div><h1>${p.name} ${p.strength||''}</h1>${p.nameBn?`<p class="name-bn large">${p.nameBn}</p>`:''}<div class="product-meta"><span>Generic: <b>${p.genericName||'-'}</b></span><span>Company: <b>${p.manufacturer||'-'}</b></span><span>Form: <b>${p.dosageForm||'-'}</b></span><span>Pack: <b>${p.packSize||'-'}</b></span><span>SKU: <b>${p.sku||'-'}</b></span><span>Barcode: <b>${p.barcode||'-'}</b></span></div><div class="detail-price"><strong>${MB.formatPrice(p.sellingPrice||p.mrp)}</strong>${discount?`<del>${MB.formatPrice(p.mrp)}</del>`:''}</div><div class="alert ${p.prescriptionRequired?'alert-warning':'alert-info'}">${p.prescriptionRequired?'এই ওষুধের জন্য প্রেসক্রিপশন প্রয়োজন।':'Prescription is not required, but pharmacist guidance is recommended.'}</div><div class="hero-actions"><button class="btn btn-primary btn-lg" onclick="MB.addToCart('${p.id}')" ${(p.stockQuantity||0)<=0?'disabled':''}>Add to Cart</button><a class="btn btn-outline btn-lg" href="/prescription-upload">Upload Prescription</a><a class="btn btn-outline btn-lg" href="https://wa.me/8801602444532" target="_blank">Consult Pharmacist</a></div></div></section><section class="card" style="margin-top:24px;"><div class="tabs">${tabs}</div>${Object.entries(content).map(([id,html],i)=>`<div class="tab-content ${i===0?'active':''}" id="tab-${id}">${html}</div>`).join('')}</section><div class="alert alert-info" style="margin-top:18px;">এই তথ্য শুধুমাত্র সাধারণ জ্ঞানের জন্য। চিকিৎসকের পরামর্শ ছাড়া ওষুধ সেবন করবেন না।</div>`;
if(p.related?.length)document.getElementById('related').innerHTML='<h2 class="section-title">Related Products</h2><div class="products-grid">'+p.related.map(MB.productCardHTML.bind(MB)).join('')+'</div>';});
</script></body></html>
